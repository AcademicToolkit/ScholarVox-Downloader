<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/src/style.css" rel="stylesheet">
    <script defer src="./src/alpine.js"></script>
  </head>
  <body class="m-0 p-0 bg-white dark:bg-gray-900">
    <div x-data="popupApp" x-init="init()" class="dark:text-gray-100">
      <div class="h-95 overflow-auto w-80 dark:bg-gray-900">
        <div x-show="activeTab === 'export'" class="p-6 flex flex-col">
          <div x-show="processing == false">
            <h2 class="text-xl font-bold mb-6 text-center text-gray-900 dark:text-white" x-text="t('export_to')"></h2>
            <form @submit.prevent="submitExport" class="flex flex-col gap-4 flex-1">
              <label class="group cursor-pointer">
                <input type="radio" name="exportMode" value="html" class="hidden" x-model="exportMode">
                <div class="flex items-center gap-3 p-4 rounded-lg border-2 border-gray-200 transition-all group-has-[:checked]:border-blue-600 group-has-[:checked]:bg-blue-50 group-has-[:checked]:dark:bg-blue-950 hover:border-gray-300">
                  <div class="flex-shrink-0">
                    <div class="flex items-center justify-center h-5 w-5 rounded-full border-2 border-gray-300 group-has-[:checked]:border-blue-600 group-has-[:checked]:bg-blue-600">
                      <div class="h-2 w-2 rounded-full dark:bg-blue-900 bg-white opacity-0 group-has-[:checked]:opacity-100"></div>
                    </div>
                  </div>
                  <div class="flex-1">
                    <p class="text-sm font-semibold text-gray-900 dark:text-blue-50">HTML</p>
                    <p class="text-xs text-gray-500" x-text="t('desc_html')"></p>
                  </div>
                </div>
              </label>
              <label class="group cursor-pointer">
                <input type="radio" name="exportMode" value="pdf" class="hidden" x-model="exportMode">
                <div class="flex items-center gap-3 p-4 rounded-lg border-2 border-gray-200 transition-all group-has-[:checked]:border-blue-600 group-has-[:checked]:bg-blue-50 group-has-[:checked]:dark:bg-blue-950 hover:border-gray-300">
                  <div class="flex-shrink-0">
                    <div class="flex items-center justify-center h-5 w-5 rounded-full border-2 border-gray-300 group-has-[:checked]:border-blue-600 group-has-[:checked]:bg-blue-600">
                      <div class="h-2 w-2 rounded-full dark:bg-blue-900 bg-white opacity-0 group-has-[:checked]:opacity-100"></div>
                    </div>
                  </div>
                  <div class="flex-1">
                    <p class="text-sm font-semibold text-gray-900 dark:text-blue-50">PDF</p>
                    <p class="text-xs text-gray-500" x-text="t('desc_pdf')"></p>
                  </div>
                </div>
              </label>
              <label class="group cursor-pointer">
                <input type="radio" name="exportMode" value="both" class="hidden" x-model="exportMode">
                <div class="flex items-center gap-3 p-4 rounded-lg border-2 border-gray-200 transition-all group-has-[:checked]:border-blue-600 group-has-[:checked]:bg-blue-50 group-has-[:checked]:dark:bg-blue-950 hover:border-gray-300">
                  <div class="flex-shrink-0">
                    <div class="flex items-center justify-center h-5 w-5 rounded-full border-2 border-gray-300 group-has-[:checked]:border-blue-600 group-has-[:checked]:bg-blue-600">
                      <div class="h-2 w-2 rounded-full dark:bg-blue-900 bg-white opacity-0 group-has-[:checked]:opacity-100"></div>
                    </div>
                  </div>
                  <div class="flex-1">
                    <p class="text-sm font-semibold text-gray-900 dark:text-blue-50" x-text="t('desc_both')"></p>
                    <p class="text-xs text-gray-500">HTML et PDF</p>
                  </div>
                </div>
              </label>

              <div class="mt-auto flex flex-col gap-3">
                <div x-show="showPageSettings" x-transition class="p-3 bg-gray-50 dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 flex flex-col gap-2">
                  <p class="text-xs font-bold text-gray-500 uppercase tracking-wider" x-text="t('page_range')"></p>
                  <div class="flex items-center gap-2">
                    <div class="flex-1">
                      <label class="text-[10px] text-gray-400" x-text="t('start')"></label>
                      <input type="number" x-model="pageStart" placeholder="1" class="w-full px-2 py-1 text-sm rounded border border-gray-300 dark:bg-gray-900 dark:text-white dark:border-gray-600 focus:ring-1 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="flex-1">
                      <label class="text-[10px] text-gray-400" x-text="t('end')"></label>
                      <input type="number" x-model="pageEnd" :placeholder="t('end')" class="w-full px-2 py-1 text-sm rounded border border-gray-300 dark:bg-gray-900 dark:text-white dark:border-gray-600 focus:ring-1 focus:ring-blue-500 outline-none">
                    </div>
                    <button type="button" @click="resetPagesValues()" class="mt-4 text-gray-400 hover:text-red-500" :title="t('reset')">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                      </svg>
                    </button>
                  </div>
                </div>

                <div class="flex gap-2">
                  <button type="submit" class="flex-1 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-semibold py-3 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 -960 960 960" fill="currentColor"><path d="M480-336 288-528l51-51 105 105v-342h72v342l105-105 51 51-192 192ZM263.72-192Q234-192 213-213.15T192-264v-72h72v72h432v-72h72v72q0 29.7-21.16 50.85Q725.68-192 695.96-192H263.72Z" /></svg>
                    <span x-text="t('export_btn')"></span>
                  </button>
                  <button type="button" @click="showPageSettings = !showPageSettings" class="px-3 rounded-lg border-2 border-gray-200 dark:border-gray-700 text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors" :class="showPageSettings ? 'border-blue-500 text-blue-500 bg-blue-50 dark:bg-blue-950' : ''">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 -960 960 960" fill="currentColor"><path d="M440-120v-240h80v80h320v80H520v80h-80Zm-320-80v-80h240v80H120Zm160-160v-80H120v-80h160v-80h80v240h-80Zm160-80v-80h400v80H440Zm160-160v-240h80v80h160v80H680v80h-80Zm-480-80v-80h400v80H120Z"/></svg>
                  </button>
                </div>
              </div>
            </form>
          </div>

          <div x-show="processing == true" class="h-80 overflow-auto">
            <div class="flex flex-col items-center mb-8">
              <h2 class="dark:text-white text-xl font-semibold tracking-tight text-gray-800 animate-pulse" x-text="t('downloading')"></h2>
            </div>
            <template x-if="pipelineState != 'end_cycle' ">
              <ul class="space-y-3 h-80">
                <li class="flex justify-center mb-2">
                  <button @click="showCompletedSteps = !showCompletedSteps" class="px-3 py-1 text-xs font-semibold rounded bg-gray-200 text-gray-700 hover:bg-gray-300 transition-all">
                    <span x-show="!showCompletedSteps" x-text="t('show_completed')"></span>
                    <span x-show="showCompletedSteps" x-text="t('hide_completed')"></span>
                  </button>
                </li>
                <template x-for="(state, step) in pipelineState" :key="step">
                  <li class="flex items-center justify-between p-4 transition-all duration-200 bg-gray-50/50 dark:bg-gray-800 rounded-2xl border border-transparent" x-show="(state !== 'ok' && state !== 100) || showCompletedSteps">
                    <div class="flex items-center gap-3 flex-1">
                      <div class="flex items-center justify-center w-6 h-6 rounded-full flex-shrink-0" :class="(state == 'ok' || state == 100) ? 'bg-emerald-100 dark:bg-emerald-800' : ((state === 'processing' || state < 100) ? 'bg-amber-100 dark:bg-amber-700' : (step === 'error' ? 'bg-red-100' : 'bg-gray-100'))">
                        <div class="w-2 h-2 rounded-full" :class="(state == 'ok' || state == 100) ? 'bg-emerald-500' : ((state === 'processing' || state < 100) ? 'bg-amber-500 animate-pulse' : (step === 'error' ? 'bg-red-500' : 'bg-gray-400') )"></div>
                      </div>
                      <template x-if="step != 'error'">
                        <div class="flex flex-col gap-1 w-full">
                          <span class="text-sm font-medium text-gray-600 dark:text-gray-200 tracking-wide" x-text="stepLabels[step].label || step"></span>
                          <span class="text-xs text-gray-400 tracking-wide" x-text="stepLabels[step].description || ''"></span>
                          <template x-if="step == 'capture_scrolling'">
                            <div class="w-full h-3 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden mt-1">
                              <div class="h-3 bg-amber-500 transition-all duration-300 rounded-full" :style="'width:' + state + '%'"></div>
                            </div>
                          </template>
                        </div>
                      </template>
                      <template x-if="step == 'error'">
                        <div class="flex flex-col gap-0.5">
                          <span class="text-sm font-medium text-gray-600 dark:text-gray-200" x-text="t('error')"></span>
                          <span class="text-xs text-gray-400" x-text="state"></span>
                        </div>
                      </template>
                    </div>
                  </li>
                </template>
              </ul>
            </template>
          </div>
        </div>

        <div x-show="activeTab === 'history'" class="p-6">
          <h2 class="dark:text-white text-xl font-bold mb-4 text-center" x-text="t('history_title')"></h2>
          <div class="flex flex-col gap-4 text-sm text-gray-700">
            <template x-if="loadingHistory">
              <p class="text-center text-gray-400" x-text="t('loading')"></p>
            </template>
            <template x-if="!loadingHistory && history.length === 0">
              <p class="text-center text-gray-400" x-text="t('no_export')"></p>
            </template>
            <template x-for="item in history" :key="item.exportedAt">
              <div class="bg-white flex flex-col gap-2 dark:bg-gray-900">
                <div class="flex items-center gap-2">
                  <template x-if="item.cover">
                    <img :src="item.cover" alt="cover" class="w-16 object-contain rounded" />
                  </template>
                  <div class="flex-1">
                    <div class="font-semibold text-base line-clamp-2 dark:text-blue-50" x-text="item.title"></div>
                    <div class="text-gray-600 dark:text-blue-50 text-xs" x-text="formatAuthors(item.authors)"></div>
                  </div>
                </div>
                <div class="flex items-center gap-0.5 mt-1">
                  <div class="text-xs leading-6 flex gap-x-1">
                    <template x-if="item.state === 'processing'">
                      <span class="mr-2 inline-flex items-center gap-x-1.5 rounded-md bg-orange-100 px-2 py-1 text-xs text-orange-700">
                        <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor">
                          <path d="M322.5-437.5Q340-455 340-480t-17.5-42.5Q305-540 280-540t-42.5 17.5Q220-505 220-480t17.5 42.5Q255-420 280-420t42.5-17.5Zm200 0Q540-455 540-480t-17.5-42.5Q505-540 480-540t-42.5 17.5Q420-505 420-480t17.5 42.5Q455-420 480-420t42.5-17.5Zm200 0Q740-455 740-480t-17.5-42.5Q705-540 680-540t-42.5 17.5Q620-505 620-480t17.5 42.5Q655-420 680-420t42.5-17.5ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Z" />
                        </svg>
                        <span class="text-xs font-medium" x-text="formatBadgeText(item.state)"></span>
                      </span>
                    </template>
                    <template x-if="item.state !== 'processing'">
                      <span class="mr-2 inline-flex items-center gap-x-1.5 rounded-md bg-teal-100 px-2 py-1 text-xs text-teal-700">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 fill-teal-500" viewBox="0 -960 960 960">
                          <path d="M382-240 154-468l57-57 171 171 367-367 57 57-424 424Z" />
                        </svg>
                        <span class="text-xs font-medium" x-text="formatBadgeText(item.state) + ' ⸱ ' + formatDate(item.exportedAt)"></span>
                      </span>
                    </template>
                  </div>
                  <div class="text-xs leading-6 flex gap-x-1">
                    <span class="mr-2 inline-flex items-center gap-x-1.5 rounded-md bg-red-100 px-2 py-1 text-xs text-red-700 cursor-pointer hover:bg-red-200" @click="deleteHistoryItem(item.exportedAt)" title="Supprimer cet export">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 fill-red-500" viewBox="0 -960 960 960">
                        <path d="m291-240-51-51 189-189-189-189 51-51 189 189 189-189 51 51-189 189 189 189-51 51-189-189-189 189Z" />
                      </svg>
                    </span>
                  </div>
                  <div class="text-xs leading-6 flex gap-x-1">
                    <span class="mr-2 inline-flex items-center gap-x-1.5 rounded-md bg-gray-100 px-2 py-1 text-xs text-gray-700 cursor-pointer hover:bg-gray-200" @click="openBookUrl(item.url)" title="Ouvrir la page du livre">
                      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 fill-gray-500" viewBox="0 -960 960 960">
                        <path d="M216-144q-29.7 0-50.85-21.15Q144-186.3 144-216v-528q0-29.7 21.15-50.85Q186.3-816 216-816h264v72H216v528h528v-264h72v264q0 29.7-21.15 50.85Q773.7-144 744-144H216Zm171-192-51-51 357-357H576v-72h240v240h-72v-117L387-336Z" />
                      </svg>
                    </span>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>

        <div x-show="activeTab === 'settings'" class="p-6 flex flex-col gap-6">
          <h2 class="dark:text-white text-xl font-bold mb-2 text-center" x-text="t('settings_title')"></h2>
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700 dark:text-blue-50" x-text="t('default_mode')"></label>
            <select :value="defaultModeUI" @input="handleDefaultMode($event)" class="focus:outline-none focus:ring-2 ring-blue-500 ring-1 w-full px-3 py-2 rounded-md text-sm bg-white dark:bg-blue-950 dark:text-blue-50">
              <option value="html">HTML</option>
              <option value="pdf">PDF</option>
              <option value="both" x-text="t('desc_both')"></option>
            </select>
            <p class="text-xs text-gray-400" x-text="t('default_mode_desc')"></p>
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700 dark:text-blue-50" x-text="t('scroll_speed')"></label>
            <select :value="scrollSpeedUI" @change="handleScrollSpeedSelect($event)" class="focus:outline-none focus:ring-2 ring-blue-500 ring-1 w-full px-3 py-2 rounded-md text-sm bg-white dark:bg-blue-950 dark:text-blue-50">
              <option value="1" x-text="t('speed_slow')"></option>
              <option value="3" x-text="t('speed_normal')"></option>
              <option value="10" x-text="t('speed_fast')"></option>
              <option value="20" x-text="t('speed_very_fast')"></option>
              <option value="custom" x-text="t('speed_custom')"></option>
            </select>
            <p class="text-xs text-gray-400" x-text="t('scroll_desc')"></p>
          </div>
          <div class="flex flex-col gap-1">
            <label x-text="t('capture_zoom')" class="text-sm font-medium text-gray-700 dark:text-blue-50"></label>
            <input type="number" step="0.1" min="0.2" max="1" :value="zoomUI" @input="handleZoom($event)" class=" focus:outline-none focus:ring-2 ring-blue-500 ring-1  w-full px-3 py-2 rounded-md text-sm bg-white dark:bg-blue-950 dark:text-blue-50" />
            <p x-text="t('zoom_desc')" class="text-xs text-gray-400"></p>
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-sm font-medium text-gray-700 dark:text-blue-50" x-text="t('theme')"></label>
            <select :value="themeUI" @input="handleTheme($event)" class="focus:outline-none focus:ring-2 ring-blue-500 ring-1 w-full px-3 py-2 rounded-md text-sm bg-white dark:bg-blue-950 dark:text-blue-50">
              <option value="auto" x-text="t('theme_auto')"></option>
              <option value="light" x-text="t('theme_light')"></option>
              <option value="dark" x-text="t('theme_dark')"></option>
            </select>
            <p class="text-xs text-gray-400" x-text="t('theme_desc')"></p>
          </div>
          <div class="pt-4">
            <button @click="settings = { scrollSpeed: 10, captureZoom: 1.0, theme: 'auto', defaultMode: 'html' }; saveSettings();" class="w-full px-3 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-md text-sm font-medium" x-text="t('restore_defaults')"></button>
          </div>
          <div class="pt-4">
            <p class="w-full block px-3 py-2 text-sm font-medium text-center">Made with ❤️</p>
            <a x-text="t('infos')" href="https://github.com/AcademicToolkit/ScholarVox-Downloader" target="_blank" class="w-full block px-3 py-2 hover:text-blue-200 text-blue-700 dark:text-blue-400 rounded-md text-sm font-medium text-center"></a>
          </div>
        </div>
      </div>

      <div class="w-full bg-white border-t border-gray-200 shadow-lg dark:bg-gray-900 dark:border-gray-700">
        <div class="flex justify-around items-center px-2 py-3">
          <button @click="setTab('export')" :class="activeTab === 'export' ? 'text-blue-600 bg-blue-50 dark:bg-blue-950' : 'text-gray-500'" class="flex flex-col items-center gap-1 py-2 px-4 rounded-lg transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 -960 960 960" fill="currentColor"><path d="M480-336 288-528l51-51 105 105v-342h72v342l105-105 51 51-192 192ZM263.72-192Q234-192 213-213.15T192-264v-72h72v72h432v-72h72v72q0 29.7-21.16 50.85Q725.68-192 695.96-192H263.72Z" /></svg>
            <span class="text-xs font-medium" x-text="t('nav_export')"></span>
          </button>
          <button @click="setTab('history')" :class="activeTab === 'history' ? 'text-blue-600 bg-blue-50 dark:bg-blue-950' : 'text-gray-500'" class="flex flex-col items-center gap-1 py-2 px-4 rounded-lg transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 -960 960 960" fill="currentColor"><path d="M480-144q-140 0-238-98t-98-238h72q0 109 77.5 186.5T480-216q109 0 186.5-77.5T744-480q0-109-77.5-186.5T480-744q-62 0-114.55 25.6Q312.91-692.8 277-648h107v72H144v-240h72v130q46-60 114.5-95T480-816q70 0 131.13 26.6 61.14 26.6 106.4 71.87 45.27 45.26 71.87 106.4Q816-550 816-480t-26.6 131.13q-26.6 61.14-71.87 106.4-45.26 45.27-106.4 71.87Q550-144 480-144Zm100-200L444-480v-192h72v162l115 115-51 51Z"/></svg>
            <span class="text-xs font-medium" x-text="t('nav_history')"></span>
          </button>
          <button @click="setTab('settings')" :class="activeTab === 'settings' ? 'text-blue-600 bg-blue-50 dark:bg-blue-950' : 'text-gray-500'" class="flex flex-col items-center gap-1 py-2 px-4 rounded-lg transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 -960 960 960" fill="currentColor"><path d="M433-80q-27 0-46.5-18T363-142l-9-66q-13-5-24.5-12T307-235l-62 26q-25 11-50 2t-39-32l-47-82q-14-23-8-49t27-43l53-40q-1-7-1-13.5v-27q0-6.5 1-13.5l-53-40q-21-17-27-43t8-49l47-82q14-23 39-32t50 2l62 26q11-8 23-15t24-12l9-66q4-26 23.5-44t46.5-18h94q27 0 46.5 18t23.5 44l9 66q13 5 24.5 12t22.5 15l62-26q25-11 50-2t39 32l47 82q14 23 8 49t-27 43l-53 40q1 7 1 13.5v27q0 6.5-2 13.5l53 40q21 17 27 43t-8 49l-48 82q-14 23-39 32t-50-2l-60-26q-11 8-23 15t-24 12l-9 66q-4 26-23.5 44T527-80h-94Zm49-260q58 0 99-41t41-99q0-58-41-99t-99-41q-59 0-99.5 41T342-480q0 58 40.5 99t99.5 41Z"/></svg>
            <span class="text-xs font-medium" x-text="t('nav_settings')"></span>
          </button>
        </div>
      </div>
    </div>
    <script src="./src/popup.js"></script>
  </body>
</html>
